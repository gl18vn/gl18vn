<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Game Hub</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{

    background:url("https://images.unsplash.com/photo-1511512578047-dfb367046420?q=80&w=1600");

    background-size:cover;

    background-position:center;

    background-attachment:fixed;

    color:white;

    min-height:100vh;

    position:relative;
}

body::before{

    content:"";

    position:fixed;

    inset:0;

    background:rgba(0,0,0,0.5);

    z-index:-1;
}

header{

    padding:25px;

    text-align:center;

    backdrop-filter:blur(10px);
}

header h1{

    font-size:48px;

    color:#60a5fa;

    text-shadow:0 0 20px #60a5fa;
}

.top-buttons{

    margin-top:20px;

    display:flex;

    justify-content:center;

    gap:12px;

    flex-wrap:wrap;
}

.top-buttons button{

    border:none;

    border-radius:14px;

    padding:12px 22px;

    background:linear-gradient(135deg,#2563eb,#60a5fa);

    color:white;

    cursor:pointer;

    transition:0.3s;
}

.top-buttons button:hover{

    transform:scale(1.05);
}

.container{

    width:95%;

    max-width:1400px;

    margin:auto;

    padding:30px 0 80px;
}

.intro{

    background:rgba(0,0,0,0.4);

    padding:30px;

    border-radius:24px;

    margin-bottom:40px;

    backdrop-filter:blur(10px);

    text-align:center;
}

.intro h2{

    color:#60a5fa;

    margin-bottom:15px;

    font-size:34px;
}

.intro p{

    color:#f1f5f9;

    line-height:1.8;

    font-size:18px;
}

.game-grid{

    display:grid;

    grid-template-columns:repeat(3,1fr);

    gap:30px;
}

.game-link{

    text-decoration:none;

    color:white;
}

.game-card{

    background:rgba(0,0,0,0.5);

    border-radius:24px;

    overflow:hidden;

    transition:0.3s;

    backdrop-filter:blur(10px);
}

.game-card:hover{

    transform:translateY(-8px) scale(1.03);
}

.game-card img{

    width:100%;

    height:260px;

    object-fit:cover;
}

.game-info{

    padding:20px;
}

.game-info h3{

    font-size:28px;

    margin-bottom:12px;

    color:#60a5fa;

    text-shadow:0 0 10px rgba(96,165,250,0.7);
}

.game-info p{

    color:#f1f5f9;

    line-height:1.7;
}

.pagination{

    margin-top:40px;

    display:flex;

    justify-content:center;

    gap:12px;
}

.pagination button{

    width:50px;

    height:50px;

    border:none;

    border-radius:14px;

    background:#2563eb;

    color:white;

    cursor:pointer;
}

.pagination button.active{

    background:#60a5fa;
}

.snow{

    position:fixed;

    top:-10px;

    color:white;

    pointer-events:none;

    animation:snowFall linear forwards;
}

@keyframes snowFall{

    to{

        transform:translateY(110vh);

        opacity:0;
    }
}

@media(max-width:1000px){

    .game-grid{
        grid-template-columns:repeat(2,1fr);
    }
}

@media(max-width:700px){

    .game-grid{
        grid-template-columns:1fr;
    }

    header h1{
        font-size:38px;
    }

    .intro h2{
        font-size:28px;
    }
}

</style>
</head>

<body>

<header>

    <h1>🎮 GL18VN</h1>

    <div class="top-buttons">

        <button
          onclick="window.open('https://t.me/viethoagame18')"
        >
          Telegram
        </button>

        <!-- <button
          onclick="window.open('https://t.me/viethoagame18')"
        >
          Telegram
        </button> -->

    </div>

</header>

<div class="container">

<div class="intro">

    <h2>Kho Game Việt Hóa</h2>

    <p>
        Website chia sẻ game Việt Hóa được cập nhật liên tục.
    </p>

</div>

<div id="gameGrid" class="game-grid"></div>

<div id="pagination" class="pagination"></div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {
    getFirestore,
    collection,
    getDocs,
    query,
    orderBy
}
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const firebaseConfig = {

    apiKey: "AIzaSyDJiIiAKSUbRjhsCloddYmoDHmAx-cJKzE",

    authDomain: "gl18vn-381ae.firebaseapp.com",

    projectId: "gl18vn-381ae",

    storageBucket: "gl18vn-381ae.firebasestorage.app",

    messagingSenderId: "488520527287",

    appId: "1:488520527287:web:940013d50c56d927390c32",

    measurementId: "G-7FPR8W312Y"
};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

const gameGrid =
document.getElementById("gameGrid");

const pagination =
document.getElementById("pagination");

let games = [];

const gamesPerPage = 9;

let currentPage = 1;

async function loadGames(){

    const querySnapshot =
    await getDocs(

        query(
            collection(db,"games"),
            orderBy("createdAt","desc")
        )
    );

    games = [];

    querySnapshot.forEach((doc)=>{

        games.push(doc.data());
    });

    renderGames(currentPage);
}

function renderGames(page){

    gameGrid.innerHTML = "";

    const start =
    (page - 1) * gamesPerPage;

    const end =
    start + gamesPerPage;

    const currentGames =
    games.slice(start,end);

    currentGames.forEach((game,index)=>{

        gameGrid.innerHTML += `

        <a
            href="game.html?id=${start + index}"
            class="game-link"
        >

            <div class="game-card">

                <img src="${game.img}">

                <div class="game-info">

                    <h3>${game.name}</h3>

                    <p>${game.desc}</p>

                </div>

            </div>

        </a>

        `;
    });

    renderPagination();
}

function renderPagination(){

    pagination.innerHTML = "";

    const totalPages =
    Math.ceil(games.length / gamesPerPage);

    for(let i=1;i<=totalPages;i++){

        pagination.innerHTML += `

        <button
            class="${i===currentPage ? 'active' : ''}"
            onclick="changePage(${i})"
        >
            ${i}
        </button>

        `;
    }
}

window.changePage = function(page){

    currentPage = page;

    renderGames(page);
};

loadGames();

</script>

<script>

function createSnow(){

    const snow =
    document.createElement("div");

    snow.classList.add("snow");

    snow.innerHTML = "❀";

    snow.style.left =
    Math.random() * window.innerWidth + "px";

    snow.style.fontSize =
    Math.random() * 20 + 10 + "px";

    snow.style.opacity =
    Math.random();

    snow.style.animationDuration =
    Math.random() * 5 + 5 + "s";

    document.body.appendChild(snow);

    setTimeout(()=>{

        snow.remove();

    },10000);
}

setInterval(createSnow,300);

</script>

</body>
</html>
