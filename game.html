<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Game Detail</title>

<style>

body{
    background:#0f172a;
    color:white;
    font-family:Arial;
}

.container{
    width:95%;
    max-width:1200px;
    margin:auto;
    padding:30px 0 80px;
}

.banner{
    width:100%;
    height:450px;
    object-fit:cover;
    border-radius:24px;
    margin-bottom:30px;
}

.title{
    font-size:42px;
    margin-bottom:20px;
    color:#60a5fa;
}

.info{
    background:#1e293b;
    padding:25px;
    border-radius:20px;
    margin-bottom:30px;
}

.info p{
    margin-bottom:15px;
    line-height:1.7;
}

.download-btn{
    display:inline-block;
    padding:15px 25px;
    background:#2563eb;
    color:white;
    text-decoration:none;
    border-radius:14px;
    margin-top:15px;
}

.gallery{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:20px;
}

.gallery img{
    width:100%;
    height:250px;
    object-fit:cover;
    border-radius:18px;
}

@media(max-width:700px){

    .banner{
        height:250px;
    }

    .gallery{
        grid-template-columns:1fr;
    }
}

</style>
</head>
<body>

<div class="container">

<div id="content"></div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {
    getFirestore,
    collection,
    getDocs
}
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const firebaseConfig = {

    apiKey: "AIzaSyDJiIiAKSUbRjhsCloddYmoDHmAx-cJKzE",

    authDomain: "gl18vn-381ae.firebaseapp.com",

    projectId: "gl18vn-381ae",

    storageBucket: "gl18vn-381ae.firebasestorage.app",

    messagingSenderId: "488520527287",

    appId: "1:488520527287:web:940013d50c56d927390c32",

    measurementId: "G-7FPR8W312Y"
};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

const content =
document.getElementById("content");

const params =
new URLSearchParams(window.location.search);

const id =
parseInt(params.get("id"));

async function loadGame(){

    const querySnapshot =
    await getDocs(collection(db,"games"));

    const games = [];

    querySnapshot.forEach((doc)=>{

        games.push(doc.data());
    });

    const game = games[id];

    content.innerHTML = `

    <img class="banner" src="${game.img}">

    <h1 class="title">
        ${game.name}
    </h1>

    <div class="info">

        <p>
            <b>Tên:</b>
            ${game.name}
        </p>

        <p>
            <b>Phiên bản:</b>
            ${game.version}
        </p>

        <p>
            <b>Dung lượng:</b>
            ${game.size}
        </p>

        <p>
            <b>Mô tả:</b>
            ${game.desc}
        </p>

        <a
            href="${game.download}"
            target="_blank"
            class="download-btn"
        >
            📥 Tải Game
        </a>

    </div>

    <div class="gallery">

        <img src="${game.image1}">

        <img src="${game.image2}">

        <img src="${game.image3}">

        <img src="${game.image4}">

    </div>

    `;
}

loadGame();

</script>

</body>
</html>
