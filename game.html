<!DOCTYPE html>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Game Detail</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#0f172a;
    color:white;
}

.container{
    width:95%;
    max-width:1200px;
    margin:auto;
    padding:30px 0 80px;
}

.back-btn{
    display:inline-block;
    margin-bottom:30px;
    padding:12px 20px;
    background:#2563eb;
    color:white;
    text-decoration:none;
    border-radius:12px;
}

.banner{
    width:100%;
    height:450px;
    object-fit:cover;
    border-radius:25px;
    margin-bottom:30px;
}

.title{
    font-size:42px;
    margin-bottom:20px;
    color:#60a5fa;
}

.desc{
    line-height:1.8;
    color:#d1d5db;
    margin-bottom:40px;
}

.gallery{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:20px;
}

.gallery img{
    width:100%;
    height:260px;
    object-fit:cover;
    border-radius:20px;
}

@media(max-width:700px){

    .gallery{
        grid-template-columns:1fr;
    }

    .banner{
        height:250px;
    }
}

</style>
</head>
<body>

<div class="container">

    <a href="index.html" class="back-btn">
        ← Quay Lại
    </a>

    <div id="content"></div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {
    getFirestore,
    collection,
    getDocs
}
</html>
