<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin Panel</title>

<style>

body{
    background:#020f2d;
    color:white;
    font-family:Arial;
    padding:30px 15px;
}

.container{
    max-width:800px;
    margin:auto;
}

.card{
    background:#1e293b;
    padding:25px;
    border-radius:20px;
    margin-top:20px;
}

input,
textarea,
button{
    width:100%;
    padding:15px;
    margin-bottom:15px;
    border:none;
    border-radius:12px;
}

button{
    background:#2563eb;
    color:white;
    cursor:pointer;
}

.game-item{
    background:#1e293b;
    padding:20px;
    border-radius:20px;
    margin-top:20px;
}

.game-item img{
    width:100%;
    height:220px;
    object-fit:cover;
    border-radius:12px;
    margin-bottom:15px;
}

.delete-btn{
    background:#dc2626;
}

</style>
</head>
<body>

<div class="container">

<h1>🎮 Admin Panel</h1>

<button id="loginBtn">
    Login Google
</button>

<div class="card">

<input type="text" id="name" placeholder="Tên game">

<input type="text" id="version" placeholder="Phiên bản">

<input type="text" id="size" placeholder="Dung lượng">

<input type="text" id="img" placeholder="Ảnh banner">

<textarea id="desc" placeholder="Mô tả"></textarea>

<input type="text" id="download" placeholder="Link tải">

<input type="text" id="image1" placeholder="Ảnh 1">

<input type="text" id="image2" placeholder="Ảnh 2">

<input type="text" id="image3" placeholder="Ảnh 3">

<input type="text" id="image4" placeholder="Ảnh 4">

<button id="addBtn">
    Thêm Game
</button>

<div id="status"></div>

</div>

<div id="gameList"></div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {
    getFirestore,
    collection,
    addDoc,
    getDocs,
    deleteDoc,
    doc
}
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

import {
    getAuth,
    GoogleAuthProvider,
    signInWithPopup,
    onAuthStateChanged
}
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";

const firebaseConfig = {

    apiKey: "AIzaSyDJiIiAKSUbRjhsCloddYmoDHmAx-cJKzE",

    authDomain: "gl18vn-381ae.firebaseapp.com",

    projectId: "gl18vn-381ae",

    storageBucket: "gl18vn-381ae.firebasestorage.app",

    messagingSenderId: "488520527287",

    appId: "1:488520527287:web:940013d50c56d927390c32",

    measurementId: "G-7FPR8W312Y"
};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

const auth = getAuth(app);

const provider = new GoogleAuthProvider();

const loginBtn =
document.getElementById("loginBtn");

const addBtn =
document.getElementById("addBtn");

const statusDiv =
document.getElementById("status");

const gameList =
document.getElementById("gameList");


loginBtn.onclick = async ()=>{

    await signInWithPopup(auth, provider);
};


onAuthStateChanged(auth,(user)=>{

    if(user){

        loginBtn.innerHTML =
        `✅ ${user.email}`;
    }
});


addBtn.onclick = async ()=>{

    const name =
    document.getElementById("name").value;

    const version =
    document.getElementById("version").value;

    const size =
    document.getElementById("size").value;

    const img =
    document.getElementById("img").value;

    const desc =
    document.getElementById("desc").value;

    const download =
    document.getElementById("download").value;

    const image1 =
    document.getElementById("image1").value;

    const image2 =
    document.getElementById("image2").value;

    const image3 =
    document.getElementById("image3").value;

    const image4 =
    document.getElementById("image4").value;


    try{

        await addDoc(collection(db,"games"),{

            name,
            version,
            size,
            img,
            desc,
            download,
            image1,
            image2,
            image3,
            image4,

            createdAt: Date.now()
        });

        statusDiv.innerHTML =
        "✅ Đã thêm game";

        loadGames();

    }
    catch(error){

        statusDiv.innerHTML =
        "❌ " + error.message;
    }
};


async function loadGames(){

    gameList.innerHTML = "";

    const querySnapshot =
    await getDocs(collection(db,"games"));

    querySnapshot.forEach((game)=>{

        const data = game.data();

        gameList.innerHTML += `

        <div class="game-item">

            <img src="${data.img}">

            <h2>${data.name}</h2>

            <p>${data.version}</p>

            <p>${data.size}</p>

            <button
                class="delete-btn"
                data-id="${game.id}"
            >
                Xóa Game
            </button>

        </div>

        `;
    });


    document
    .querySelectorAll(".delete-btn")
    .forEach((btn)=>{

        btn.onclick = async ()=>{

            const id =
            btn.dataset.id;

            await deleteDoc(doc(db,"games",id));

            loadGames();
        };
    });
}

loadGames();

</script>

</body>
</html>
