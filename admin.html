<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Game Hub Admin</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#0f172a;
    color:white;
    min-height:100vh;
    padding:30px 15px;
}

.container{
    width:100%;
    max-width:700px;
    margin:auto;
}

.title{
    text-align:center;
    margin-bottom:30px;
}

.title h1{
    color:#60a5fa;
    font-size:38px;
}

.card{
    background:#1e293b;
    padding:25px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

.input-group{
    margin-bottom:20px;
}

.input-group label{
    display:block;
    margin-bottom:8px;
    color:#cbd5e1;
}

.input-group input,
.input-group textarea{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    background:#334155;
    color:white;
    font-size:16px;
}

.input-group textarea{
    min-height:120px;
    resize:vertical;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:14px;
    background:#2563eb;
    color:white;
    font-size:17px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#3b82f6;
}

.login-btn{
    margin-bottom:20px;
}

.status{
    margin-top:20px;
    text-align:center;
    font-size:16px;
}

.game-list{
</html>
